name: Build and Package Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install Dependencies
      run: |
        poetry config virtualenvs.create true
        poetry config virtualenvs.in-project true
        poetry env use python
        poetry install --no-root
        poetry run pip install -e .[dev]

    - name: Build Executable with PyInstaller
      run: |
        poetry run pyinstaller installer/music_mastery_enhancer.spec --noconfirm

    - name: Compile Inno Setup Installer
      run: |
        iscc installer/setup_script.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MusicMasteryEnhancer-Setup
        path: installer/output/MusicMasteryEnhancer-Setup.exe
